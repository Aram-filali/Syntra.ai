# docker-compose.yml - Syntra.ai Development & Production Environment
version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: syntra_postgres
    environment:
      POSTGRES_USER: ${DB_USER:-meeting_user}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-meeting_pass}
      POSTGRES_DB: ${DB_NAME:-meeting_intelligence}
    ports:
      - "${DB_PORT:-5433}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-meeting_user}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - syntra_network

  # Redis Cache & Message Broker
  redis:
    image: redis:7-alpine
    container_name: syntra_redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    command: redis-server --requirepass ${REDIS_PASSWORD:-redispass}
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - syntra_network

  # FastAPI Backend
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syntra_backend
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    ports:
      - "${BACKEND_PORT:-8000}:8000"
    environment:
      DATABASE_URL: postgresql://${DB_USER:-meeting_user}:${DB_PASSWORD:-meeting_pass}@postgres:5432/${DB_NAME:-meeting_intelligence}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      JWT_SECRET_KEY: ${JWT_SECRET_KEY:-dev-secret-key-change-in-production}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@syntra.ai}
      FROM_NAME: ${FROM_NAME:-Syntra.ai}
      ZOOM_CLIENT_ID: ${ZOOM_CLIENT_ID}
      ZOOM_CLIENT_SECRET: ${ZOOM_CLIENT_SECRET}
      ENVIRONMENT: ${ENVIRONMENT:-development}
      DEBUG: ${DEBUG:-True}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - ./backend:/app
    networks:
      - syntra_network

  # Celery Worker (Async Tasks)
  worker:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syntra_worker
    command: celery -A app.tasks.celery_app worker --loglevel=info -Q meetings --concurrency=4
    environment:
      DATABASE_URL: postgresql://${DB_USER:-meeting_user}:${DB_PASSWORD:-meeting_pass}@postgres:5432/${DB_NAME:-meeting_intelligence}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@syntra.ai}
      FROM_NAME: ${FROM_NAME:-Syntra.ai}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL}
      ASSEMBLYAI_API_KEY: ${ASSEMBLYAI_API_KEY}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      - postgres
      - redis
      - backend
    volumes:
      - ./backend:/app
    networks:
      - syntra_network

  # Celery Beat Scheduler (Weekly Summary, etc.)
  beat:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syntra_beat
    command: celery -A app.tasks.celery_app beat --loglevel=info --pidfile=/tmp/celerybeat.pid
    environment:
      DATABASE_URL: postgresql://${DB_USER:-meeting_user}:${DB_PASSWORD:-meeting_pass}@postgres:5432/${DB_NAME:-meeting_intelligence}
      REDIS_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      SMTP_HOST: ${SMTP_HOST:-smtp.gmail.com}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASSWORD: ${SMTP_PASSWORD}
      FROM_EMAIL: ${FROM_EMAIL:-noreply@syntra.ai}
      FROM_NAME: ${FROM_NAME:-Syntra.ai}
      FRONTEND_URL: ${FRONTEND_URL:-http://localhost:3000}
      ENVIRONMENT: ${ENVIRONMENT:-development}
    depends_on:
      - postgres
      - redis
      - backend
      - worker
    volumes:
      - ./backend:/app
    networks:
      - syntra_network

  # React Frontend (Development)
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: syntra_frontend
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    environment:
      VITE_API_URL: ${VITE_API_URL:-http://localhost:8000}
      VITE_ZOOM_CLIENT_ID: ${VITE_ZOOM_CLIENT_ID}
    depends_on:
      - backend
    networks:
      - syntra_network

  # Celery Flower (Monitoring - Development Only)
  flower:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: syntra_flower
    command: celery -A app.tasks.celery_app flower --port=5555 --broker=${CELERY_BROKER_URL:-redis://:redispass@redis:6379/0}
    ports:
      - "${FLOWER_PORT:-5555}:5555"
    environment:
      CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
      CELERY_RESULT_BACKEND: redis://:${REDIS_PASSWORD:-redispass}@redis:6379/0
    depends_on:
      - redis
      - backend
      - worker
    networks:
      - syntra_network
    profiles:
      - monitoring

volumes:
  postgres_data:
    driver: local
  redis_data:
    driver: local

networks:
  syntra_network:
    driver: bridge